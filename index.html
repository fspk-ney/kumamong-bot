<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ออมเงินกับคุ้มมง 🐾</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Kanit', sans-serif; }
        .card { border-radius: 25px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-kumamong { background-color: #1DB446; color: white; border-radius: 15px; font-weight: 600; padding: 12px; }
    </style>
</head>
<body class="p-3">
    <div class="container mt-2">
        <div class="card p-4">
            <h4 class="text-center mb-4">💰 สร้างรายการออมใหม่</h4>
            
            <div class="mb-3">
                <label class="form-label">👥 เลือกสมาชิกที่จะออม</label>
                <select id="target_user" class="form-select">
                    <option value="">กำลังโหลดสมาชิก...</option>
                </select>
                <small class="text-muted">*ถ้าไม่เจอชื่อเพื่อน ให้เพื่อนพิมพ์ "เมี๊ยว" ในกลุ่มก่อนนะ</small>
            </div>

            <div class="mb-3">
                <label class="form-label">🎯 ชื่อรายการออม</label>
                <input type="text" id="goal" class="form-control" placeholder="เช่น ทริปญี่ปุ่น">
            </div>

            <div class="mb-3">
                <label class="form-label">💵 ยอดรวมทั้งหมด (บาท)</label>
                <input type="number" id="total" class="form-control" placeholder="0.00">
            </div>

            <div class="row">
                <div class="col-6 mb-3"><label class="form-label">🔢 จำนวนงวด</label><input type="number" id="count" class="form-control" value="10"></div>
                <div class="col-6 mb-3">
                    <label class="form-label">🔄 ความถี่</label>
                    <select id="freq_unit" class="form-select">
                        <option value="7d">ทุก 1 อาทิตย์</option>
                        <option value="1m">ทุก 1 เดือน</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-6 mb-3"><label class="form-label">📅 เริ่มงวดแรก</label><input type="date" id="start_date" class="form-control"></div>
                <div class="col-6 mb-4"><label class="form-label">⏰ เวลาทวง</label><input type="time" id="remind_time" class="form-control" value="08:00"></div>
            </div>

            <button class="btn btn-kumamong w-100" onclick="confirmBill()">บันทึกรายการเมี๊ยว!</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://your-project.supabase.co"; // ใส่ของเฮีย
        const SUPABASE_KEY = "your-anon-key"; // ใส่ของเฮีย
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function main() {
            await liff.init({ liffId: "2009693749-SfmWsP0l" });
            document.getElementById('start_date').valueAsDate = new Date();

            const urlParams = new URLSearchParams(window.location.search);
            const groupId = urlParams.get('groupId') || 'personal';

            // ดึงรายชื่อสมาชิกในกลุ่มนี้มาให้เลือก
            const { data: members } = await supabaseClient
                .from('group_members')
                .select('*')
                .eq('group_id', groupId);

            const select = document.getElementById('target_user');
            select.innerHTML = '<option value="">-- จิ้มเลือกชื่อเพื่อน --</option>';
            members.forEach(m => {
                select.innerHTML += `<option value="${m.user_id}">${m.display_name}</option>`;
            });
        }

        function confirmBill() {
            const goal = document.getElementById('goal').value;
            const total = document.getElementById('total').value;
            const count = document.getElementById('count').value;
            const unit = document.getElementById('freq_unit').value;
            const start = document.getElementById('start_date').value;
            const time = document.getElementById('remind_time').value;
            const select = document.getElementById('target_user');
            const targetId = select.value;
            const targetName = select.options[select.selectedIndex].text;

            if (!goal || !targetId || !total) return alert('กรอกข้อมูลและเลือกเพื่อนด้วยเมี๊ยว!');

            liff.sendMessages([{
                type: 'text',
                text: `[คำสั่งออมเงิน]\nชื่อทริป: ${goal}\nยอดรวม: ${total}\nจำนวนงวด: ${count}\nความถี่: ${unit}\nเริ่มวันที่: ${start}\nเวลาทวง: ${time}\nTargetID: ${targetId}\nTargetName: ${targetName}`
            }]).then(() => liff.closeWindow());
        }
        main();
    </script>
</body>
</html>
