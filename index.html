<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ออมเงินกับคุ้มมง 🐾</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Kanit', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-kumamong { background-color: #1DB446; color: white; border-radius: 12px; font-weight: 600; padding: 12px; }
    </style>
</head>
<body class="p-3">
    <div class="container mt-3">
        <div class="card p-4">
            <h3 class="text-center mb-4">💰 ออมเงินใหม่</h3>
            
            <label class="small text-muted">ชื่อรายการออม</label>
            <input type="text" id="goal" class="form-control mb-3" placeholder="เช่น ทริปเที่ยว/ซื้อของ">

            <label class="small text-muted">ความถี่ในการเรียกเก็บ</label>
            <select id="freq_unit" class="form-select mb-3">
                <option value="7d">ทุก 1 อาทิตย์</option>
                <option value="14d">ทุก 2 อาทิตย์</option>
                <option value="21d">ทุก 3 อาทิตย์</option>
                <option value="1m">ทุก 1 เดือน</option>
            </select>

            <div class="row">
                <div class="col-6">
                    <label class="small text-muted">เริ่มงวดแรกวันที่</label>
                    <input type="date" id="start_date" class="form-control mb-3">
                </div>
                <div class="col-6">
                    <label class="small text-muted">⏰ เวลาที่ให้ทวง</label>
                    <input type="time" id="remind_time" class="form-control mb-3" value="08:00">
                </div>
            </div>

            <div class="row">
                <div class="col-6">
                    <label class="small text-muted">จำนวนงวด</label>
                    <input type="number" id="count" class="form-control mb-3" value="36">
                </div>
                <div class="col-6">
                    <label class="small text-muted">ยอดเป้าหมาย</label>
                    <input type="number" id="total" class="form-control mb-3" placeholder="0.00">
                </div>
            </div>

            <button class="btn btn-kumamong w-100 mt-2" onclick="confirmBill()">ยืนยันสร้างบิล</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://jvuhjuvvarpjcwpgwkny.supabase.co";
        const SUPABASE_KEY = "sb_publishable_H3wOadSnVy-bEwHt0Ls5kA_8V80145c26b23d9377be8345c61304543b593f4be8c8"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function main() {
            await liff.init({ liffId: "2009693749-SfmWsP0l" });
            document.getElementById('start_date').valueAsDate = new Date();
        }

        function confirmBill() {
            const goal = document.getElementById('goal').value;
            const total = document.getElementById('total').value;
            const count = document.getElementById('count').value;
            const unit = document.getElementById('freq_unit').value;
            const start = document.getElementById('start_date').value;
            const time = document.getElementById('remind_time').value;

            if(!goal || !total || !time) return alert('กรอกข้อมูลให้ครบเมี๊ยว!');

            liff.sendMessages([{ 
                type: 'text', 
                text: `[คำสั่งออมเงิน]\nชื่อทริป: ${goal}\nยอดรวม: ${total}\nจำนวนงวด: ${count}\nความถี่: ${unit}\nเริ่มวันที่: ${start}\nเวลาทวง: ${time}` 
            }]).then(() => liff.closeWindow());
        }
        main();
    </script>
</body>
</html>
