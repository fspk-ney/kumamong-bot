<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังออมเงินคุ้มมง 🐾</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Kanit', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .btn-kumamong { background-color: #1DB446; color: white; border-radius: 12px; font-weight: 600; transition: 0.3s; }
        .btn-kumamong:hover { background-color: #169a3a; color: white; }
        .d-none { display: none !important; }
    </style>
</head>
<body class="p-3">
    <div class="container mt-4">
        <div id="create-section" class="card p-4">
            <h3 class="text-center mb-4">🐾 สร้างบิลออมเงิน</h3>
            <div class="mb-3">
                <label class="form-label">ชื่อทริป/เป้าหมาย</label>
                <input type="text" id="goal" class="form-control" placeholder="เช่น ทริปญี่ปุ่น">
            </div>
            <div class="mb-3">
                <label class="form-label">ยอดเงินรวม (บาท)</label>
                <input type="number" id="amount" class="form-control" placeholder="0.00">
            </div>
            <button class="btn btn-kumamong w-100 p-3" onclick="sendBill()">สร้างบิลและส่งเข้าแชท</button>
        </div>

        <div id="pay-section" class="card p-4 d-none">
            <div class="text-center mb-4">
                <div style="font-size: 50px;">💰</div>
                <h3 class="mt-2">ยืนยันการชำระเงิน</h3>
                <p class="text-muted">บิลหมายเลข: <span id="display-bill-id" class="fw-bold text-primary"></span></p>
            </div>
            <p class="text-center">คุณกำลังบันทึกสถานะว่า **"จ่ายเงินแล้ว"**</p>
            <button class="btn btn-kumamong w-100 p-3 mb-2" onclick="confirmPayment()">✅ ยืนยันว่าจ่ายแล้ว</button>
            <button class="btn btn-outline-secondary w-100 p-2" onclick="liff.closeWindow()">ยกเลิก</button>
        </div>
    </div>

    <script>
        async function main() {
            // ใส่ LIFF ID ของเฮียตรงนี้
            await liff.init({ liffId: "2009693749-SfmWsP0l" });

            // ตรวจสอบว่าใน URL มี bill_id ไหม
            const urlParams = new URLSearchParams(window.location.search);
            const billId = urlParams.get('bill_id');

            if (billId) {
                // ถ้ามี bill_id -> ซ่อนหน้าสร้างบิล โชว์หน้าจ่ายเงิน
                document.getElementById('create-section').classList.add('d-none');
                document.getElementById('pay-section').classList.remove('d-none');
                document.getElementById('display-bill-id').innerText = billId;
            }
        }

        function sendBill() {
            const goal = document.getElementById('goal').value;
            const amount = document.getElementById('amount').value;
            if (!goal || !amount) return alert('กรอกให้ครบนะเฮีย!');

            liff.sendMessages([{
                type: 'text',
                text: `[คำสั่งออมเงิน]\nชื่อทริป: ${goal}\nยอดรวม: ${amount}`
            }]).then(() => liff.closeWindow())
               .catch(err => alert('Error: ' + err));
        }

        function confirmPayment() {
            const urlParams = new URLSearchParams(window.location.search);
            const billId = urlParams.get('bill_id');
            
            liff.sendMessages([{
                type: 'text',
                text: `[ยืนยันจ่ายเงิน]\nBillID: ${billId}`
            }]).then(() => {
                alert('บันทึกสำเร็จเมี๊ยว!');
                liff.closeWindow();
            }).catch(err => alert('Error: ' + err));
        }

        main();
    </script>
</body>
</html>
