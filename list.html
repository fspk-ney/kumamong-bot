<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะการออม 📋</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-3">
    <h4 class="fw-bold mb-4">📊 เช็กคนจ่าย/ไม่จ่าย</h4>
    <div id="bill-list">กำลังโหลดข้อมูลเมี๊ยว...</div>

    <script>
        const SUPABASE_URL = "https://your-project.supabase.co"; // ใส่ของเฮีย
        const SUPABASE_KEY = "your-anon-key"; // ใส่ของเฮีย
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadBills() {
            await liff.init({ liffId: "2009693749-SfmWsP0l" });
            const { data: bills } = await supabaseClient.from('bills').select('*').order('created_at', {ascending: false});
            
            const container = document.getElementById('bill-list');
            container.innerHTML = '';

            bills.forEach(bill => {
                const isPaid = bill.status === 'paid';
                container.innerHTML += `
                    <div class="card p-3 mb-3" style="border-left: 5px solid ${isPaid ? '#28a745' : '#dc3545'}">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h6 class="fw-bold">${bill.bill_name}</h6>
                                <p class="mb-1 small">👤 สมาชิก: ${bill.member_name}</p>
                                <p class="mb-0 small">💰 งวดละ: ${bill.per_person} บาท</p>
                            </div>
                            <div class="text-end">
                                <span class="badge ${isPaid ? 'bg-success' : 'bg-danger'}">${isPaid ? 'จ่ายแล้ว ✅' : 'ค้างชำระ ❌'}</span>
                                <div class="mt-2"><button onclick="deleteBill(${bill.id})" class="btn btn-sm btn-outline-secondary">ลบ</button></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        async function deleteBill(id) {
            if(confirm('ลบรายการนี้ไหมเมี๊ยว?')) {
                await supabaseClient.from('bills').delete().eq('id', id);
                location.reload();
            }
        }
        loadBills();
    </script>
</body>
</html>
