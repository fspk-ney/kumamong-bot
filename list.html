<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการรายการออม 🐶 มะมง</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Kanit', sans-serif; color: #333; }
        .bill-card { border-radius: 20px; border: none; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: white; transition: 0.3s; }
        .bill-card:hover { transform: translateY(-5px); }
        .card-content { padding: 20px; cursor: pointer; }
        .inst-card { border-radius: 15px; border: 1px solid #eee; margin-bottom: 12px; padding: 15px; cursor: pointer; transition: 0.2s; background: #fff; }
        .inst-card:hover { border-color: #1DB446; background-color: #f0fff4; }
        .btn-pay { background-color: #1DB446; border: none; border-radius: 10px; color: #fff; padding: 6px 15px; font-weight: 600; }
        .btn-main-edit { background-color: #ffc107; border: none; border-radius: 10px; padding: 6px 15px; font-weight: 600; }
        .btn-main-delete { background-color: #ff4d4d; border: none; border-radius: 10px; color: #fff; padding: 6px 15px; font-weight: 600; }
        .progress-mini { height: 8px; border-radius: 10px; background: #eee; margin-top: 10px; }
    </style>
</head>
<body class="p-3">
    <div class="container" style="max-width: 500px;">
        <h4 class="fw-bold mb-4 text-center">📊 มะมงจัดการรายการออม 🐶</h4>
        <div id="bill-list">
            <div class="text-center p-5"><div class="spinner-border text-success"></div></div>
        </div>
    </div>

    <div class="modal fade" id="mainModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content" style="border-radius: 25px; border: none;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modal-title">รายละเอียด</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal-body"></div>
            </div>
        </div>
    </div>

    <script>
        const client = supabase.createClient("https://jvuhjuvvarpjcwpgwkny.supabase.co", "sb_publishable_H3wOadSnVy-bEwHt0Ls5kA_8V8Olboe");
        let allProjects = [];

        async function loadBills() {
            const listDiv = document.getElementById('bill-list');
            const { data: bills, error } = await client.from('bills').select('*').order('next_due', { ascending: true });
            
            if (error) { listDiv.innerHTML = `<div class="alert alert-danger">${error.message}</div>`; return; }
            if (!bills || bills.length === 0) { listDiv.innerHTML = '<div class="text-center p-5">ยังไม่มีรายการครับเฮีย 🐾</div>'; return; }

            // 🛠️ จัดกลุ่มข้อมูลใหม่: 1 โปรเจกต์ -> หลายงวด -> 2 รายชื่อ
            const projects = {};
            bills.forEach(bill => {
                if (!projects[bill.bill_name]) {
                    projects[bill.bill_name] = { 
                        name: bill.bill_name, 
                        total: bill.total_amount, 
                        installments: {} 
                    };
                }
                if (!projects[bill.bill_name].installments[bill.next_due]) {
                    projects[bill.bill_name].installments[bill.next_due] = [];
                }
                projects[bill.bill_name].installments[bill.next_due].push(bill);
            });

            allProjects = Object.values(projects);
            listDiv.innerHTML = '';
            
            allProjects.forEach((proj, idx) => {
                const installmentDates = Object.keys(proj.installments).sort();
                const totalInstCount = installmentDates.length;
                const sampleMember = proj.installments[installmentDates[0]][0];
                const perPerson = sampleMember.per_person;
                
                // นับงวดที่จ่ายครบแล้ว
                let finishedInst = 0;
                installmentDates.forEach(date => {
                    if (proj.installments[date].every(m => m.status === 'paid')) finishedInst++;
                });

                listDiv.innerHTML += `
                    <div class="card bill-card">
                        <div class="card-content" onclick="showInstallmentList(${idx})">
                            <div class="d-flex justify-content-between">
                                <h5 class="fw-bold text-success mb-1">🎯 ${proj.name}</h5>
                                <span class="badge bg-primary rounded-pill" style="height: fit-content;">${totalInstCount} งวด</span>
                            </div>
                            <div class="small text-muted mb-2">เป้าหมายรวม: ฿${proj.total.toLocaleString()}</div>
                            <div class="p-2 rounded-3 mb-2" style="background: #eef2ff; border: 1px dashed #4f46e5;">
                                <div class="fw-bold text-primary">💸 เก็บคนละ: ฿${perPerson.toLocaleString()} / งวด</div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center small mt-3">
                                <span>ความคืบหน้า: ${finishedInst}/${totalInstCount} งวด</span>
                                <span class="text-muted">คลิกจัดการ 🐾</span>
                            </div>
                            <div class="progress progress-mini">
                                <div class="progress-bar bg-success" style="width: ${(finishedInst/totalInstCount)*100}%"></div>
                            </div>
                        </div>
                        <div class="card-footer border-0 bg-transparent px-3 pb-3 d-flex gap-2">
                            <button class="btn-main-delete ms-auto" onclick="deleteProject('${proj.name.replace(/'/g, "\\'")}')">ลบ</button>
                        </div>
                    </div>
                `;
            });
        }

        // หน้าต่างที่ 1: เลือกงวด
        function showInstallmentList(idx) {
            const proj = allProjects[idx];
            const modalBody = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = `เลือกงวด: ${proj.name}`;

            const sortedDates = Object.keys(proj.installments).sort();
            let html = `<div class="list-group list-group-flush">`;
            
            sortedDates.forEach((date, i) => {
                const members = proj.installments[date];
                const paidCount = members.filter(m => m.status === 'paid').length;
                const isDone = paidCount === members.length;

                html += `
                    <div class="inst-card" onclick="showMemberAction(${idx}, '${date}')">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="fw-bold">งวดที่ ${i + 1}</div>
                                <small class="text-muted">📅 ${date}</small>
                            </div>
                            <span class="badge ${isDone ? 'bg-success' : 'bg-warning text-dark'}">
                                ${isDone ? 'ครบแล้ว' : `จ่ายแล้ว ${paidCount}/${members.length}`}
                            </span>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            modalBody.innerHTML = html;
            new bootstrap.Modal(document.getElementById('mainModal')).show();
        }

        // หน้าต่างที่ 2: รายชื่อคนจ่ายในงวดนั้น (จะมีแค่ 2 คนตามที่เฮียหาร)
        function showMemberAction(projIdx, date) {
            const proj = allProjects[projIdx];
            const members = proj.installments[date];
            const modalBody = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = `งวดวันที่ ${date}`;

            let html = `<button class="btn btn-sm btn-light mb-3" onclick="showInstallmentList(${projIdx})">⬅ ย้อนกลับ</button>`;
            
            members.forEach(m => {
                const isPaid = m.status === 'paid';
                html += `
                    <div class="d-flex justify-content-between align-items-center p-3 mb-2 rounded-3 border ${isPaid ? 'bg-light' : 'bg-white'}">
                        <div>
                            <div class="fw-bold">${m.member_name}</div>
                            <div class="small ${isPaid ? 'text-success' : 'text-danger'}">
                                ${isPaid ? '✅ จ่ายแล้ว' : '⏳ ยังไม่จ่าย'}
                            </div>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold mb-1">฿${m.per_person.toLocaleString()}</div>
                            ${!isPaid ? `<button class="btn-pay" onclick="quickPay('${m.id}')">กดจ่าย</button>` : ''}
                        </div>
                    </div>
                `;
            });
            modalBody.innerHTML = html;
        }

        async function quickPay(id) {
            const { error } = await client.from('bills').update({ status: 'paid' }).eq('id', id);
            if (error) alert(error.message); 
            else {
                // ปิด Modal และโหลดใหม่
                bootstrap.Modal.getInstance(document.getElementById('mainModal')).hide();
                loadBills();
            }
        }

        async function deleteProject(name) {
            if (confirm(`เฮียจะลบรายการ "${name}" ทิ้งทั้งหมดเลยนะ?`)) {
                const { error } = await client.from('bills').delete().eq('bill_name', name);
                if (error) alert(error.message); else location.reload();
            }
        }

        loadBills();
    </script>
</body>
</html>
