<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการรายการออม 🐶 มะมง</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Kanit', sans-serif; color: #333; }
        .bill-card { border-radius: 20px; border: none; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: white; transition: 0.3s; }
        .bill-card:hover { transform: translateY(-3px); }
        .card-content { padding: 20px; cursor: pointer; }
        .inst-card { border-radius: 15px; border: 1px solid #eee; margin-bottom: 12px; padding: 15px; cursor: pointer; transition: 0.2s; background: #fff; }
        .inst-card:hover { border-color: #1DB446; background-color: #f0fff4; }
        .btn-pay { background-color: #1DB446; border: none; border-radius: 10px; color: #fff; padding: 6px 15px; font-weight: 600; }
        .btn-main-edit { background-color: #ffc107; border: none; border-radius: 10px; padding: 6px 15px; font-weight: 600; color: #000; }
        .btn-main-delete { background-color: #ff4d4d; border: none; border-radius: 10px; color: #fff; padding: 6px 15px; font-weight: 600; }
        .progress-mini { height: 12px; border-radius: 10px; background: #eee; margin-top: 10px; }
        /* สไตล์เพิ่มเติมสำหรับโชว์ยอดเงิน */
        .money-text { font-size: 0.9rem; font-weight: 600; color: #2c3e50; }
        .goal-text { font-size: 0.75rem; color: #888; }
    </style>
</head>
<body class="p-3">
    <div class="container" style="max-width: 500px;">
        <h4 class="fw-bold mb-4 text-center">📊 มะมงจัดการรายการออม 🐶</h4>
        <div id="bill-list">
            <div class="text-center p-5"><div class="spinner-border text-success"></div></div>
        </div>
    </div>

    <div class="modal fade" id="mainModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content" style="border-radius: 25px; border: none;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modal-title">รายละเอียด</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal-body"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 20px;">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">📝 แก้ไขรายการ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-old-name">
                    <div class="mb-3">
                        <label class="form-label">🎯 ชื่อรายการ</label>
                        <input type="text" id="edit-name" class="form-control" style="border-radius: 10px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">💰 ยอดเป้าหมายรวม (บาท)</label>
                        <input type="number" id="edit-total" class="form-control" style="border-radius: 10px;">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-success w-100" onclick="updateProject()" style="border-radius: 10px;">บันทึกการแก้ไข</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const client = supabase.createClient("https://jvuhjuvvarpjcwpgwkny.supabase.co", "sb_publishable_H3wOadSnVy-bEwHt0Ls5kA_8V8Olboe");
        let allProjects = [];

        async function loadBills() {
            const listDiv = document.getElementById('bill-list');
            const { data: bills, error } = await client.from('bills').select('*').order('id', { ascending: true });
            
            if (error) { listDiv.innerHTML = `<div class="alert alert-danger">${error.message}</div>`; return; }
            if (!bills || bills.length === 0) { listDiv.innerHTML = '<div class="text-center p-5">ยังไม่มีรายการครับเฮีย 🐾</div>'; return; }

            const grouped = {};
            bills.forEach(bill => {
                if (!grouped[bill.bill_name]) {
                    grouped[bill.bill_name] = { name: bill.bill_name, total: bill.total_amount, raw: [] };
                }
                grouped[bill.bill_name].raw.push(bill);
            });

            allProjects = Object.values(grouped).map(proj => {
                const uniqueNames = [...new Set(proj.raw.map(b => b.member_name))];
                const memberCount = uniqueNames.length; 
                const installmentList = [];
                for (let i = 0; i < proj.raw.length; i += memberCount) {
                    installmentList.push(proj.raw.slice(i, i + memberCount));
                }
                return { ...proj, memberCount, installmentList };
            });

            listDiv.innerHTML = '';
            allProjects.forEach((proj, idx) => {
                const totalInstCount = proj.installmentList.length; 
                const finishedInstCount = proj.installmentList.filter(inst => inst.every(m => m.status === 'paid')).length;
                const perPersonTotal = proj.total / proj.memberCount;
                const perInst = proj.installmentList[0][0].per_person;

                // --- 💰 คำนวณเงินจริงตามงวดที่จ่ายแล้ว ---
                const currentCollected = proj.raw
                    .filter(b => b.status === 'paid')
                    .reduce((sum, b) => sum + b.per_person, 0);

                listDiv.innerHTML += `
                    <div class="card bill-card">
                        <div class="card-content" onclick="showInstallmentList(${idx})">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h5 class="fw-bold text-success mb-0">🎯 ${proj.name}</h5>
                                    <small class="text-muted">เป้าหมาย: ฿${proj.total.toLocaleString()} (หาร ${proj.memberCount} คน)</small>
                                </div>
                                <span class="badge bg-primary rounded-pill">${totalInstCount} งวด</span>
                            </div>
                            
                            <div class="mt-3 p-3 rounded-4" style="background: #f0f7ff; border: 1px solid #cfe2ff;">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <span class="text-secondary small fw-bold">💰 สรุปรวมคนละ:</span>
                                    <span class="fw-bold text-dark fs-5">฿${perPersonTotal.toLocaleString()}</span>
                                </div>
                                <div class="d-flex justify-content-between align-items-center mt-2 pt-2" style="border-top: 1px dashed #abc;">
                                    <span class="text-secondary small">💸 แบ่งเก็บงวดละ:</span>
                                    <span class="fw-bold text-primary">฿${perInst.toLocaleString()}</span>
                                </div>
                            </div>

                            <div class="mt-3">
                                <div class="d-flex justify-content-between align-items-end">
                                    <span class="money-text">💰 เก็บได้แล้ว: ฿${currentCollected.toLocaleString()}</span>
                                    <span class="goal-text">จากทั้งหมด ฿${proj.total.toLocaleString()}</span>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mt-2">
                                <span class="fw-bold" style="font-size: 0.85rem;">
                                    🚀 ความคืบหน้า: <span class="text-success">${finishedInstCount}</span> / ${totalInstCount} งวด
                                </span>
                                <span class="text-muted small">คลิกจัดการ 🐾</span>
                            </div>
                            <div class="progress progress-mini">
                                <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" 
                                     style="width: ${(currentCollected / proj.total) * 100}%">
                                </div>
                            </div>
                        </div>
                        <div class="card-footer border-0 bg-transparent px-3 pb-3 d-flex gap-2">
                            <button class="btn-main-edit" onclick="openEditProject(${idx})">แก้ไข</button>
                            <button class="btn-main-delete" onclick="deleteProject('${proj.name.replace(/'/g, "\\'")}')">ลบ</button>
                        </div>
                    </div>
                `;
            });
        }

        // ฟังก์ชันอื่นๆ (เหมือนเดิมครบถ้วนครับเฮีย)
        function showInstallmentList(idx) {
            const proj = allProjects[idx];
            const modalBody = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = `งวดทั้งหมด: ${proj.name}`;
            let html = ``;
            proj.installmentList.forEach((inst, i) => {
                const paidCount = inst.filter(m => m.status === 'paid').length;
                const isAllPaid = paidCount === proj.memberCount;
                html += `
                    <div class="inst-card" onclick="showMemberAction(${idx}, ${i})">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="fw-bold">งวดที่ ${i + 1}</div>
                                <small class="text-muted">📅 ${inst[0].next_due || 'ยังไม่ระบุ'}</small>
                            </div>
                            <span class="badge ${isAllPaid ? 'bg-success' : 'bg-warning text-dark'}">
                                ${isAllPaid ? 'ครบแล้ว' : `จ่ายแล้ว ${paidCount}/${proj.memberCount}`}
                            </span>
                        </div>
                    </div>`;
            });
            modalBody.innerHTML = html;
            new bootstrap.Modal(document.getElementById('mainModal')).show();
        }

        function showMemberAction(projIdx, instIdx) {
            const proj = allProjects[projIdx];
            const members = proj.installmentList[instIdx];
            const modalBody = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = `งวดที่ ${instIdx + 1} (${proj.name})`;
            let html = `<button class="btn btn-sm btn-light mb-3" onclick="showInstallmentList(${projIdx})">⬅ ย้อนกลับไปดูงวด</button>`;
            members.forEach(m => {
                const isPaid = m.status === 'paid';
                html += `
                    <div class="d-flex justify-content-between align-items-center p-3 mb-2 rounded-3 border ${isPaid ? 'bg-light' : 'bg-white'}">
                        <div>
                            <div class="fw-bold">${m.member_name}</div>
                            <div class="small ${isPaid ? 'text-success' : 'text-danger'}">${isPaid ? '✅ จ่ายเรียบร้อย' : '⏳ ยังไม่จ่าย'}</div>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold mb-1">฿${m.per_person.toLocaleString()}</div>
                            ${!isPaid ? `<button class="btn-pay" onclick="quickPay('${m.id}')">กดจ่าย</button>` : ''}
                        </div>
                    </div>`;
            });
            modalBody.innerHTML = html;
        }

        async function quickPay(id) {
            const { error } = await client.from('bills').update({ status: 'paid' }).eq('id', id);
            if (error) alert(error.message); else location.reload();
        }

        async function deleteProject(name) {
            if (confirm(`เฮียจะลบรายการ "${name}" ทิ้งทั้งหมดเลยนะ?`)) {
                const { error } = await client.from('bills').delete().eq('bill_name', name);
                if (error) alert(error.message); else location.reload();
            }
        }

        function openEditProject(idx) {
            const proj = allProjects[idx];
            document.getElementById('edit-old-name').value = proj.name;
            document.getElementById('edit-name').value = proj.name;
            document.getElementById('edit-total').value = proj.total;
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        async function updateProject() {
            const oldName = document.getElementById('edit-old-name').value;
            const newName = document.getElementById('edit-name').value;
            const newTotal = document.getElementById('edit-total').value;
            const { error } = await client.from('bills').update({ bill_name: newName, total_amount: parseFloat(newTotal) }).eq('bill_name', oldName);
            if (error) alert(error.message); else location.reload();
        }

        loadBills();
    </script>
</body>
</html>
