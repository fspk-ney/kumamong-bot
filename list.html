<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะการออม 📊</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Kanit', sans-serif; }
        .bill-card { border-radius: 15px; border: none; transition: 0.3s; }
        .status-paid { border-left: 8px solid #28a745; }
        .status-pending { border-left: 8px solid #dc3545; }
    </style>
</head>
<body class="p-3">
    <h4 class="fw-bold mb-4">📊 เช็กสถานะคนจ่ายเงิน</h4>
    <div id="bill-container">กำลังโหลดข้อมูล...</div>

    <script>
        const client = supabase.createClient("https://jvuhjuvvarpjcwpgwkny.supabase.co", "sb_publishable_H3wOadSnVy-bEwHt0Ls5kA_8V8Olboe");

        async function loadBills() {
            const { data: bills } = await client.from('bills').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('bill-container');
            container.innerHTML = '';

            if(!bills || bills.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">ยังไม่มีรายการออมเมี๊ยว</p>';
                return;
            }

            bills.forEach(bill => {
                const isPaid = bill.status === 'paid';
                container.innerHTML += `
                    <div class="card bill-card p-3 mb-3 ${isPaid ? 'status-paid' : 'status-pending'} shadow-sm">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="fw-bold mb-1">${bill.bill_name}</h6>
                                <div class="small text-muted">👤 สมาชิก: ${bill.member_name}</div>
                                <div class="small text-muted">💰 งวดละ: ${bill.per_person.toLocaleString()} บาท</div>
                                <div class="small text-muted">📅 งวดถัดไป: ${bill.next_due}</div>
                            </div>
                            <div class="text-end">
                                <span class="badge ${isPaid ? 'bg-success' : 'bg-danger'} mb-2">${isPaid ? 'จ่ายแล้ว ✅' : 'ค้างชำระ ❌'}</span>
                                <br>
                                <button onclick="deleteBill(${bill.id})" class="btn btn-sm btn-outline-secondary">ลบ</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function deleteBill(id) {
            if(confirm('จะลบรายการนี้จริงๆ หรอเมี๊ยว?')) {
                await client.from('bills').delete().eq('id', id);
                loadBills();
            }
        }
        loadBills();
    </script>
</body>
</html>
