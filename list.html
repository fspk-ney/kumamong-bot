<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการเงินออม 📋</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Kanit', sans-serif; }
        .card-bill { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .badge-pending { background-color: #ff4d4d; }
        .badge-paid { background-color: #28a745; }
        .btn-action { border-radius: 8px; font-size: 0.85rem; }
    </style>
</head>
<body class="p-3">
    <div class="container">
        <h4 class="fw-bold mb-4">📋 รายการออมของเฮีย</h4>
        <div id="bill-container">
            <p class="text-center text-muted">กำลังตามหาบิลให้เฮียอยู่เมี๊ยว...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://your-project.supabase.co"; // ก๊อปจาก Supabase เฮีย
        const SUPABASE_KEY = "your-anon-key"; // ก๊อปจาก Supabase เฮีย
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            await liff.init({ liffId: "2009693749-SfmWsP0l" });
            if (!liff.isLoggedIn()) { liff.login(); }
            renderBills();
        }

        async function renderBills() {
            const profile = await liff.getProfile();
            const { data: bills, error } = await supabaseClient
                .from('bills')
                .select('*')
                .eq('created_by', profile.userId)
                .order('next_due', { ascending: true });

            const container = document.getElementById('bill-container');
            container.innerHTML = '';

            bills.forEach(bill => {
                const isPaid = bill.status === 'paid';
                container.innerHTML += `
                    <div class="card card-bill p-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="badge ${isPaid ? 'badge-paid' : 'badge-pending'} mb-2">
                                    ${isPaid ? 'จ่ายแล้ว ✨' : 'ค้างชำระ ⚠️'}
                                </span>
                                <h6 class="fw-bold mb-1">${bill.bill_name}</h6>
                                <p class="text-muted small mb-0">ยอด: ${bill.per_person} บาท</p>
                                <p class="text-muted small">นัดชำระ: ${bill.next_due}</p>
                            </div>
                            <div class="d-flex flex-column gap-2">
                                <button class="btn btn-outline-danger btn-action" onclick="deleteBill(${bill.id})">ลบ</button>
                                ${!isPaid ? `<button class="btn btn-success btn-action" onclick="markAsPaid(${bill.id})">จ่าย</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function deleteBill(id) {
            if(confirm("จะลบรายการนี้จริงๆ หรอเฮีย?")) {
                await supabaseClient.from('bills').delete().eq('id', id);
                renderBills();
            }
        }

        async function markAsPaid(id) {
            await supabaseClient.from('bills').update({ status: 'paid' }).eq('id', id);
            alert("บันทึกการจ่ายเรียบร้อยเมี๊ยว!");
            renderBills();
        }

        init();
    </script>
</body>
</html>
